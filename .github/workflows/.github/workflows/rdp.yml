name: Windows Remote Desktop (CRD)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download Chrome Remote Desktop
        shell: pwsh
        run: |
          $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          $output = "$env:RUNNER_TEMP\crd.msi"
          Invoke-WebRequest $url -OutFile $output
          Start-Process msiexec.exe -ArgumentList "/i `"$output`" /quiet /norestart" -Wait

      - name: Verify Installation
        shell: pwsh
        run: |
          $path = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (Test-Path $path) {
            Write-Host "CRD installed successfully"
          } else {
            Write-Error "CRD installation failed"
            exit 1
          }

      - name: Start Chrome Remote Desktop
        shell: pwsh
        run: |
          $authCode = "${{ secrets.CRD_AUTH_CODE }}"
          $pin = "${{ secrets.CRD_PIN }}"
          $path = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"

          Write-Host "Starting Chrome Remote Desktop..."

          & $path `
            --code="$authCode" `
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" `
            --name="$env:COMPUTERNAME" `
            --pin="$pin"

          Write-Host "CRD started successfully"

      - name: Keep Alive
        shell: pwsh
        run: |
          Write-Host "Keeping session alive..."
          Start-Sleep -Seconds 21600
