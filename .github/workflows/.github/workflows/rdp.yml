name: Windows CRD Runner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP (optional fallback)
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Download CRD
        shell: pwsh
        run: |
          $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          $file = "$env:TEMP\crd.msi"
          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$file`" /quiet /norestart"

      - name: Check CRD install
        shell: pwsh
        run: |
          $path = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (!(Test-Path $path)) {
            Write-Error "CRD not found"
            exit 1
          }
          Write-Host "CRD OK"

      - name: Start CRD Host
        shell: pwsh
        run: |
          $code = "${{ secrets.CRD_AUTH_CODE }}"
          $pin  = "${{ secrets.CRD_PIN }}"
          $path = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"

          Write-Host "Launching CRD..."

          Start-Process -FilePath $path -ArgumentList @(
            "--code=$code",
            "--redirect-url=https://remotedesktop.google.com/_/oauthredirect",
            "--name=$env:COMPUTERNAME",
            "--pin=$pin"
          ) -NoNewWindow -Wait

      - name: Keep Alive
        run: |
          echo "Runner active"
          ping -t localhost
